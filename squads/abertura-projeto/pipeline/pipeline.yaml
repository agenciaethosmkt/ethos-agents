name: "Pipeline de Acompanhamento de Projeto"
version: "1.0.0"
description: >
  Ativado no due_date de uma task de marco. Sobe ao projeto principal,
  varre todos os marcos, analisa status e entrega relatório de acompanhamento.

steps:
  - id: step-01-ler-marco
    name: "Ler Marco Ativado"
    agent: analista-setup
    file: steps/step-01-ler-marco.md
    output: marco_ativado (tipo, nome, projeto_id)

  - id: step-02-contexto-projeto
    name: "Contexto do Projeto"
    agent: analista-setup
    file: steps/step-02-contexto-projeto.md
    depends_on: step-01-ler-marco
    output: projeto (cliente, produto, start_date, due_date, assignees)

  - id: step-03-varredura
    name: "Varredura dos Marcos"
    agent: analista-setup
    file: steps/step-03-varredura.md
    depends_on: step-02-contexto-projeto
    output: status_por_marco (tasks concluídas, em andamento, atrasadas, não iniciadas)

  - id: step-04-relatorio
    name: "Relatório de Acompanhamento"
    agent: redator
    file: steps/step-04-relatorio.md
    depends_on: step-03-varredura
    output: comentário formatado postado na tarefa principal

  - id: step-05-revisao
    name: "Devolver para Revisão"
    agent: analista-setup
    file: steps/step-05-revisao.md
    depends_on: step-04-relatorio
    output: status da task ativada + tarefa principal = "em revisão"
