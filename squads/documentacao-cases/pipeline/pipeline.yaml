name: pipeline-documentacao-cases
description: Pipeline de geração de cases a partir de planilhas e dados de anúncio

steps:
  - id: step-01
    file: steps/step-01-identificar-cliente.md
    name: Identificar Cliente e Contexto
    agent: analista

  - id: step-02
    file: steps/step-02-processar-planilha-leads.md
    name: Processar Planilha de Leads
    agent: analista

  - id: step-03
    file: steps/step-03-processar-dados-campanha.md
    name: Processar Dados de Campanha
    agent: analista

  - id: step-04
    file: steps/step-04-calcular-metricas.md
    name: Calcular Métricas Consolidadas
    agent: analista
    outputFile: output/metricas.md

  - id: step-05
    file: steps/step-05-redigir-case.md
    name: Redigir Case
    agent: redator
    outputFile: output/case.md

  - id: step-06
    file: steps/step-06-revisar-case.md
    name: Revisar Case
    agent: analista

    checkpoints:
      - id: aprovar-case
        name: Aprovação do Case
        approver: renato
        description: >
          Renato revisa antes de publicar. Pode anonimizar o cliente,
          ajustar números ou adicionar contexto que o agente não tinha.

  - id: step-07
    file: steps/step-07-publicar-case.md
    name: Publicar Case
    agent: analista

flow:
  on_checkpoint_approved:
    aprovar-case: step-07
  on_checkpoint_rejected:
    aprovar-case: step-05
